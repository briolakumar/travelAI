        <div id="bar"></div>
      </div>

        <div class="hint" id="hint"></div>

    </section>

        const soundOn = (localStorage.getItem("tw_sound") ?? "on") === "on";
        if (!soundOn) return;

        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "sine";
        osc.frequency.value = freq;

        osc.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.value = 0.05;

        osc.start();
        window.setTimeout(() => {
          osc.stop();
          ctx.close();
        }, dur * 1000);
      };

        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      };

          : { ...baseMission };

      const titleEl = $("missionTitle");

      const qTextEl = $("qText");

      const comboEl = $("combo");
      const timeEl = $("time");
      const barEl = $("bar");

      let idx = 0;
      let answered = false;
      let combo = 0;

      let points = getNum("tw_points", 0);
      let earnedThisRun = 0;

      let timeLeft = mission.timePerQ;
      let timerId = null;

      titleEl.textContent = isDaily ? `${mission.title} (Daily)` : mission.title;
      descEl.textContent = mission.desc;

      const updateHUD = () => {
        pointsEl.textContent = String(points);
        levelEl.textContent = String(calcLevel(points));
        comboEl.textContent = String(combo);
        barEl.style.width = `${Math.round((idx / mission.questions.length) * 100)}%`;
        timeEl.textContent = String(timeLeft);

      const stopTimer = () => {
        if (!timerId) return;
        clearInterval(timerId);
        timerId = null;
      };

      const startTimer = () => {
        stopTimer();
        timeLeft = mission.timePerQ;
        updateHUD();

        timerId = setInterval(() => {
          timeLeft -= 1;
          timeEl.textContent = String(timeLeft);

          if (timeLeft <= 0) {
            stopTimer();
            onTimeout();
          }
        }, 1000);
      };

      const renderQuestion = () => {
        answered = false;
        nextBtn.disabled = true;

        hintEl.style.display = "none";
        hintEl.textContent = "";

        const item = mission.questions[idx];
        qTextEl.textContent = `Q${idx + 1}/${mission.questions.length}: ${item.q}`;
        answersEl.innerHTML = "";

        item.a.forEach((text, i) => {
          const btn = document.createElement("button");
          btn.className = "ans";
          btn.type = "button";
          btn.textContent = text;
          btn.addEventListener("click", () => chooseAnswer(i, btn));
          answersEl.appendChild(btn);
        });

        startTimer();
        updateHUD();
      };

      const revealCorrect = (correctIdx) => {
        document.querySelectorAll(".ans").forEach((b, j) => {
          if (j === correctIdx) b.classList.add("correct");
        });
      };

      const chooseAnswer = (choiceIdx, btnEl) => {
        if (answered) return;
        answered = true;
        stopTimer();

        revealCorrect(item.correct);

          points += gained;

        nextBtn.disabled = false;

        hintEl.style.display = "block";

        nextBtn.disabled = false;
        beep(180, 0.12);
        updateHUD();
      };

      const skipQuestion = () => {
        if (answered) return;
        stopTimer();
        answered = true;
        combo = 0;

        hintEl.textContent = "Skipped. Tip: Answer quickly to earn speed bonus and keep your combo!";
        hintEl.style.display = "block";

        nextBtn.disabled = false;
        beep(320, 0.06);
        updateHUD();
      };

      const finishGame = () => {
        setNum("tw_points", points);
        alert("Finished (prototype).");
      };

      const nextQuestion = () => {
        if (idx < mission.questions.length - 1) {
          idx += 1;
          renderQuestion();
          return;
        }
        finishGame();
      };

      skipBtn.addEventListener("click", skipQuestion);
      nextBtn.addEventListener("click", nextQuestion);

      renderQuestion();
    })();
  </script>
</body>

</html>
