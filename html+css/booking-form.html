<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripWise — Booking Form</title>
  <link rel="stylesheet" href="tripwise.css" />
</head>

<body>
  <div class="top" role="banner">
    <div class="brand">
      <img src="../images/logo1.png" alt="TripWise logo" />
      <h1>TripWise</h1>
    </div>
    <nav style="display:flex; flex-direction:row; gap:10px; align-items:center;">
      <a class="btn btn-primary" href="search-results.html">← Results</a>
      <a class="btn btn-primary" href="traveller-dashboard.html">Dashboard</a>
    </nav>
  </div>

  <main class="container">
    <div class="grid">
      <section class="card span-7">
        <h2>Complete Your Booking</h2>

        <form id="bookingForm" novalidate>
          <label for="destinationSelect">Destination</label>
          <select id="destinationSelect" required>
            <option value="">Loading destinations…</option>
          </select>

          <label for="stayType">Select Accommodation</label>
          <select id="stayType" name="stayType" required>
            <option value="">Select a destination first</option>
          </select>

          <div class="row">
            <div style="flex:1">
              <label for="checkin">Check-in</label>
              <input id="checkin" type="date" required />
            </div>
            <div style="flex:1">
              <label for="checkout">Check-out</label>
              <input id="checkout" type="date" required />
            </div>
          </div>

          <label for="guests">Guests</label>
          <select id="guests">
            <option value="1">1 guest</option>
            <option value="2" selected>2 guests</option>
            <option value="3">3 guests</option>
            <option value="4">4 guests</option>
            <option value="5">5 guests</option>
          </select>

          <p id="message" style="margin-top:12px;color:#b00020;font-weight:bold;"></p>

          <button id="confirmBooking" class="btn btn-primary" type="submit" style="margin-top:14px">
            Confirm Booking
          </button>
        </form>
      </section>

      <aside class="card span-5">
        <h2>Booking Summary</h2>
        <div class="stay">
          <strong id="sumStay">—</strong>
          <div id="sumDestination" style="color:grey;font-size:13px;">—</div>
          <div id="sumPrice">—</div>
        </div>
        <hr>
        <div class="summary">
          <div class="summary-row"><span>Nights</span><strong id="sumNights">—</strong></div>
          <div class="summary-row"><span>Price per night</span><strong id="sumPerNight">—</strong></div>
          <div class="summary-row"><span>Total</span><strong id="sumTotal">—</strong></div>
        </div>
      </aside>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="api/api.js"></script>
  <script>

    /* Toast */
    let toastTimer = null;
    function showToast(msg, isError = false) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.toggle("error", isError);
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 3000);
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const form = document.getElementById("bookingForm");
      const destSelect = document.getElementById("destinationSelect");
      const stayType = document.getElementById("stayType");
      const checkin = document.getElementById("checkin");
      const checkout = document.getElementById("checkout");
      const guests = document.getElementById("guests");
      const msg = document.getElementById("message");

      const today = new Date().toISOString().split("T")[0];
      checkin.setAttribute("min", today);
      checkout.setAttribute("min", today);

      const parseDate = val => val ? new Date(val + "T00:00:00") : null;

      /* Summary */
      function updateSummary() {
        const stayOpt = stayType.options[stayType.selectedIndex];
        const destOpt = destSelect.options[destSelect.selectedIndex];
        const nightly = Number(stayOpt?.dataset.price || 0);
        const inDate = parseDate(checkin.value);
        const outDate = parseDate(checkout.value);

        document.getElementById("sumStay").textContent =
          stayOpt?.value ? stayOpt.textContent.split(" — ")[0] : "—";
        document.getElementById("sumDestination").textContent =
          destOpt?.value ? destOpt.textContent : "—";
        document.getElementById("sumPrice").textContent =
          nightly ? `£${nightly}/night` : "—";
        document.getElementById("sumPerNight").textContent =
          nightly ? `£${nightly}` : "—";

        msg.textContent = "";

        if (inDate && outDate && outDate <= inDate) {
          msg.textContent = "Check-out must be after check-in.";
          document.getElementById("sumNights").textContent = "—";
          document.getElementById("sumTotal").textContent = "—";
          return;
        }

        if (inDate && outDate) {
          const nights = Math.round((outDate - inDate) / (1000 * 60 * 60 * 24));
          document.getElementById("sumNights").textContent = nights;
          document.getElementById("sumTotal").textContent = nightly ? `£${nights * nightly}` : "—";
        } else {
          document.getElementById("sumNights").textContent = "—";
          document.getElementById("sumTotal").textContent = "—";
        }
      }

      /* Load accommodations */
      async function loadAccommodations(destinationId) {
        stayType.innerHTML = `<option value="">Loading…</option>`;
        stayType.disabled = true;
        try {
          const accommodations = await apiFetch(`/api/destinations/${destinationId}/accommodations`);
          if (!accommodations || !accommodations.length) {
            stayType.innerHTML = `<option value="">No accommodation found</option>`;
            stayType.disabled = false;
            updateSummary();
            return;
          }
          stayType.innerHTML = accommodations.map(a =>
            `<option value="${a.id}" data-price="${a.price_per_night}">
               ${a.title} — £${a.price_per_night}/night ★${a.rating}
             </option>`
          ).join("");
          stayType.disabled = false;
          updateSummary();
        } catch (err) {
          stayType.innerHTML = `<option value="">Could not load accommodation</option>`;
          stayType.disabled = false;
          console.error("Accommodation load error:", err.message);
        }
      }

      /* Load destinations */
      try {
        const destinations = await apiFetch("/api/destinations");
        if (!destinations || !destinations.length) {
          destSelect.innerHTML = `<option value="">No destinations found</option>`;
          msg.textContent = "Could not load destinations.";
          return;
        }
        destSelect.innerHTML =
          `<option value="">Select destination</option>` +
          destinations.map(d =>
            `<option value="${d.id}" data-slug="${d.slug}">
               ${d.name} (${d.country_name})
             </option>`
          ).join("");

        const slug = new URLSearchParams(window.location.search).get("dest");
        if (slug) {
          const match = destinations.find(d => d.slug === slug);
          if (match) {
            destSelect.value = String(match.id);
            await loadAccommodations(match.id);
          }
        }
        updateSummary();
      } catch (err) {
        msg.textContent = "Could not load destinations from server.";
        destSelect.innerHTML = `<option value="">Error loading destinations</option>`;
        console.error(err);
      }

      /* Events */
      destSelect.addEventListener("change", async () => {
        const id = destSelect.value;
        if (!id) {
          stayType.innerHTML = `<option value="">Select a destination first</option>`;
          updateSummary();
          return;
        }
        await loadAccommodations(id);
      });

      [stayType, checkin, checkout, guests].forEach(el => {
        el.addEventListener("change", updateSummary);
      });

      /* Submit */
      form.addEventListener("submit", async e => {
        e.preventDefault();
        msg.textContent = "";

        const destinationId = destSelect.value;
        const accommodationId = stayType.value;

        if (!destinationId) { msg.textContent = "Please select a destination."; return; }
        if (!accommodationId) { msg.textContent = "Please select an accommodation."; return; }
        if (!checkin.value || !checkout.value) {
          msg.textContent = "Please select check-in and check-out dates."; return;
        }
        if (parseDate(checkout.value) <= parseDate(checkin.value)) {
          msg.textContent = "Check-out must be after check-in."; return;
        }

        const btn = document.getElementById("confirmBooking");
        btn.disabled = true;
        btn.textContent = "Booking…";

        try {
          await apiFetch("/api/bookings", {
            method: "POST",
            body: JSON.stringify({
              destination_id: Number(destinationId),
              accommodation_id: Number(accommodationId),
              check_in: checkin.value,
              check_out: checkout.value,
              guests: Number(guests.value),
              status: "confirmed"
            })
          });
          showToast("Booking confirmed! Redirecting…");
          setTimeout(() => { window.location.href = "traveller-dashboard.html"; }, 1500);
        } catch (err) {
          msg.textContent = "Booking failed: " + err.message;
          btn.disabled = false;
          btn.textContent = "Confirm Booking";
        }
      });
    });
  </script>
</body>

</html>
