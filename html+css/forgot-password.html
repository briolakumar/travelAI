<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripWise — Forgot Password</title>
    <link rel="stylesheet" href="tripwise.css" />
</head>

<body class="auth-page">
    <header class="header" aria-label="Site header"></header>

    <main class="container">
        <section class="box" aria-labelledby="page-title">
            <h1 id="page-title">Forgot Password</h1>
            <p class="subtitle">Enter your email and we'll send you a password reset link.</p>

            <p id="errorMsg"
                style="display:none; color:white; background:#d32f2f; padding:10px; border-radius:4px; text-align:center; margin-bottom:15px; font-weight:bold;">
            </p>

            <form id="forgotForm" novalidate>
                <label for="email">Email Address</label>
                <input id="email" name="email" type="email" required autocomplete="email" inputmode="email"
                    placeholder="name@example.com" />

                <button class="btn" id="submitBtn" type="submit">Send Reset Link</button>

                <p id="message" class="message" role="status" aria-live="polite" hidden>
                    If an account exists with this email, a reset link has been sent. Check your terminal.
                </p>

                <div class="row-actions">
                    <a class="link" href="traveller-login.html">Back to login</a>
                </div>
            </form>
        </section>
    </main>

    <footer class="footer" aria-label="Site footer"></footer>

    <script src="api/api.js"></script>
    <script>
        (() => {
            "use strict";

            const form = document.getElementById("forgotForm");
            const emailInput = document.getElementById("email");
            const submitBtn = document.getElementById("submitBtn");
            const message = document.getElementById("message");
            const errorMsg = document.getElementById("errorMsg");

            emailInput.addEventListener("input", () => {
                message.hidden = true;
                errorMsg.style.display = "none";
            });

            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = "Sending…";
                message.hidden = true;
                errorMsg.style.display = "none";

                try {
                    await fetch("http://localhost:3000/api/auth/forgot-password", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email: emailInput.value.trim().toLowerCase() })
                    });

                    message.hidden = false;
                    form.reset();

                } catch (err) {
                    errorMsg.textContent = "Something went wrong. Please try again.";
                    errorMsg.style.display = "block";
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Send Reset Link";
                }
            });
        })();
    </script>
</body>

</html>
