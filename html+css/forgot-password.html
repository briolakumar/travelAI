<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripWise — Forgot Password</title>
    <link rel="stylesheet" href="tripwise.css" />
</head>

<body>
    <header class="header" aria-label="Site header"></header>

    <div class="logo-bar" role="banner">
        <img src="../images/logo1.png" alt="TripWise logo" />
        <span class="brand-title">TripWise</span>
    </div>

    <main class="container">
        <section class="box" aria-labelledby="page-title">
            <h1 id="page-title">Forgot Password</h1>
            <p class="subtitle">Enter your email and we’ll send you a password reset link.</p>

            <form id="forgotForm" action="#" method="post" novalidate>
                <div class="field">
                    <label for="email">Email Address</label>
                    <input id="email" name="email" type="email" required autocomplete="email" inputmode="email"
                        placeholder="name@example.com" />
                </div>

                <button class="btn" type="submit">Send Reset Link</button>

                <p id="message" class="message" role="status" aria-live="polite" hidden>
                    If an account exists with this email, a reset link has been sent.
                </p>

                <div class="row-actions">
                    <a class="link" href="traveller-login.html">Back to login</a>
                </div>
            </form>
        </section>
    </main>

    <footer class="footer" aria-label="Site footer"></footer>

    <script>
        (() => {
            "use strict";

            const form = document.getElementById("forgotForm");
            const emailInput = document.getElementById("email");
            const message = document.getElementById("message");

            // Hide the message whenever the user edits the email
            const hideMessage = () => {
                message.hidden = true;
            };

            emailInput.addEventListener("input", hideMessage);

            form.addEventListener("submit", (e) => {
                e.preventDefault(); 

                // Let the browser validate required + email format
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }

                // Prototype feedback: show a neutral confirmation message
                message.hidden = false;

            });
        })();
    </script>
</body>

</html>
