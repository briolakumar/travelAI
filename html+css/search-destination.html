<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripWise — Search Destinations</title>
  <link rel="stylesheet" href="tripwise.css" />
</head>

<body>
  <header class="header" aria-label="Top bar"></header>

  <div class="top" role="banner">
    <div class="brand">
      <img src="../images/logo1.png" alt="TripWise logo" />
      <h1>TripWise</h1>
    </div>

    <nav aria-label="Page navigation">
      <a class="link" href="traveller-dashboard.html">← Back to dashboard</a>
    </nav>
  </div>

  <main class="container">
    <section class="card" aria-labelledby="page-title">
      <h2 id="page-title">Search Destinations</h2>
      <p>Search for a destination and explore responsible accommodation options.</p>

      <!-- Single search form -->
      <form id="searchForm" action="search-results.html" method="get">
        <div class="grid">
          <div class="span-6">
            <label for="destination">Destination</label>
            <select id="destination" name="q" required></select>
          </div>

          <div class="span-6">
            <label for="dates">Travel Dates</label>
            <input id="dates" name="dates" type="text" placeholder="e.g., 12 Mar - 16 Mar" />
          </div>

          <div class="span-4">
            <label for="guests">Guests</label>
            <select id="guests" name="guests">
              <option value="1">1 guest</option>
              <option value="2">2 guests</option>
              <option value="3">3 guests</option>
              <option value="4">4 guests</option>
              <option value="5">5+ guests</option>
            </select>
          </div>

          <div class="span-4">
            <label for="budget">Budget</label>
            <select id="budget" name="budget">
              <option value="">Any</option>
              <option value="low">Low</option>
              <option value="mid">Mid</option>
              <option value="high">High</option>
            </select>
          </div>

          <div class="span-4">
            <label for="type">Stay Type</label>
            <select id="type" name="type">
              <option value="">Any</option>
              <option value="hotel">Hotel</option>
              <option value="homestay">Homestay</option>
              <option value="eco">Eco lodge</option>
              <option value="hostel">Hostel</option>
            </select>
          </div>

          <div class="span-12">
            <label for="responsible">Responsible Travel Preferences</label>
            <select id="responsible" name="responsible">
              <option value="">No preference</option>
              <option value="local">Locally owned</option>
              <option value="eco">Eco-certified</option>
              <option value="community">Community-run</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Search</button>
          <button class="btn btn-ghost" type="reset">Clear</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer" aria-label="Footer"></footer>

  <script src="../nodejs/destinations.js"></script>
  <script>
    (() => {
      "use strict";
      // Runs after the page loads to safely access DOM elements

      const destinationSelect = document.getElementById("destination");

      // Ensure helper exists before calling it
      if (typeof window.populateDestinationSelect !== "function") {
        destinationSelect.innerHTML = '<option value="">Dataset not loaded</option>';
        return;
      }

      // Populate the destination <select> using your existing helper
      window.populateDestinationSelect("destination", true);
    })();
  </script>
</body>

</html>
