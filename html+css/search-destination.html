<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripWise — Search Destinations</title>
  <link rel="stylesheet" href="tripwise.css" />
</head>

<body>
  <header class="header" aria-label="Top bar"></header>

  <div class="top" role="banner">
    <div class="brand">
      <img src="../images/logo1.png" alt="TripWise logo" />
      <h1>TripWise</h1>
    </div>
    <nav aria-label="Page navigation">
      <a class="btn btn-primary" href="traveller-dashboard.html">Back to dashboard</a>
    </nav>
  </div>

  <main class="container">
    <section class="card">
      <h2>Search Destinations</h2>
      <p>Find your destination, explore cultural guidance, and book responsibly.</p>

      <form id="searchForm">
        <div class="grid">
          <div class="span-6">
            <label for="destination">Destination</label>
            <select id="destination">
              <option value="">Loading destinations…</option>
            </select>
          </div>

          <div class="span-3">
            <label for="checkin">Check-in</label>
            <input type="date" id="checkin" />
          </div>

          <div class="span-3">
            <label for="checkout">Check-out</label>
            <input type="date" id="checkout" />
          </div>

          <div class="span-4">
            <label for="guests">Guests</label>
            <select id="guests">
              <option value="1">1 guest</option>
              <option value="2">2 guests</option>
              <option value="3">3 guests</option>
              <option value="4">4 guests</option>
              <option value="5">5+ guests</option>
            </select>
          </div>

          <div class="span-4">
            <label for="budget">Budget</label>
            <select id="budget">
              <option value="">Any</option>
              <option value="low">Low (under £50/night)</option>
              <option value="mid">Mid (£50–£150/night)</option>
              <option value="high">High (£150+/night)</option>
            </select>
          </div>

          <div class="span-4">
            <label for="responsible">Travel Preference</label>
            <select id="responsible">
              <option value="">No preference</option>
              <option value="local">Locally owned</option>
              <option value="eco">Eco-friendly</option>
              <option value="community">Community-run</option>
            </select>
          </div>
        </div>

        <p id="searchMsg" style="color:#b00020;font-size:13px;margin-top:8px;"></p>

        <div class="actions" style="margin-top:14px">
          <button class="btn btn-primary" type="submit">Search Destinations</button>
          <button class="btn btn-ghost" type="reset" id="clearBtn">Clear</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer"></footer>

  <script src="api/api.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const destSelect  = document.getElementById("destination");
      const checkin     = document.getElementById("checkin");
      const checkout    = document.getElementById("checkout");
      const form        = document.getElementById("searchForm");
      const searchMsg   = document.getElementById("searchMsg");

      const today = new Date().toISOString().split("T")[0];
      checkin.setAttribute("min", today);
      checkout.setAttribute("min", today);

      checkin.addEventListener("change", () => {
        checkout.min = checkin.value;
        if (checkout.value && checkout.value < checkin.value) checkout.value = "";
      });

      /* Load destinations into dropdown */
      try {
        const destinations = await apiFetch("/api/destinations");
        destSelect.innerHTML =
          `<option value="">All destinations</option>` +
          destinations.map(d =>
            `<option value="${d.slug}">${d.name} (${d.country_name})</option>`
          ).join("");
      } catch (err) {
        destSelect.innerHTML = `<option value="">Could not load destinations</option>`;
        console.error("Destination load error:", err);
      }

      document.getElementById("clearBtn").addEventListener("click", () => {
        searchMsg.textContent = "";
      });

      form.addEventListener("submit", e => {
        e.preventDefault();
        searchMsg.textContent = "";

        const slug = destSelect.value;

        /* If specific destination chosen go straight to details */
        if (slug) {
          let url = `destination-details.html?dest=${slug}`;
          if (checkin.value)  url += `&checkin=${checkin.value}`;
          if (checkout.value) url += `&checkout=${checkout.value}`;
          window.location.href = url;
          return;
        }

        /* Otherwise go to results page with optional filter */
        window.location.href = `search-results.html`;
      });
    });
  </script>
</body>
</html>
