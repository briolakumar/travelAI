<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripWise — Community Registration</title>
    <link rel="stylesheet" href="tripwise.css" />
</head>

<body>
    <header class="header" aria-label="Top bar"></header>

    <header class="logo-bar" aria-label="TripWise branding">
        <img src="../images/logo1.png" alt="TripWise logo" />
        <span class="brand-title">TripWise</span>
    </header>

    <main class="container">
        <section class="box mid" aria-labelledby="page-title">
            <h1 id="page-title">Community Partner Registration</h1>
            <p class="subtitle">Create a community account to list local experiences and receive bookings.</p>

            <form id="comRegister" action="#" method="post" novalidate>
                <div class="field">
                    <label for="c_org">Community / Organisation Name</label>
                    <input id="c_org" name="orgName" type="text" required autocomplete="organization"
                        placeholder="e.g., Siem Reap Craft Cooperative" />
                </div>

                <div class="field">
                    <label for="c_location">Location (Town/Region)</label>
                    <input id="c_location" name="location" type="text" required autocomplete="address-level2"
                        placeholder="e.g., Siem Reap, Cambodia" />
                </div>

                <div class="field">
                    <label for="c_email">Contact Email</label>
                    <input id="c_email" name="email" type="email" required autocomplete="email" inputmode="email"
                        placeholder="contact@example.com" />
                </div>

                <div class="field">
                    <label for="c_password">Password</label>
                    <input id="c_password" name="password" type="password" minlength="8" required
                        autocomplete="new-password" placeholder="Minimum 8 characters" aria-describedby="pw-hint" />
                    <p class="hint" id="pw-hint">Use at least 8 characters.</p>
                </div>

                <div class="field">
                    <label for="c_confirm">Confirm Password</label>
                    <input id="c_confirm" name="confirmPassword" type="password" minlength="8" required
                        autocomplete="new-password" placeholder="Re-enter password" />
                </div>

                <div class="checks">
                    <label for="partner-terms">
                        <input id="partner-terms" type="checkbox" required />
                        I agree to the Partner Terms and Conditions
                    </label>
                </div>

                <button class="btn mt-14" type="submit">Create Community Account</button>

                <div class="row-actions">
                    <a class="link" href="localcommunities-login.html">Already a partner? Log in</a>
                </div>
            </form>
        </section>
    </main>

    <footer class="footer" aria-label="Footer">
        <div class="logo-bar" aria-label="TripWise branding footer">
            <img src="../images/logo1.png" alt="TripWise logo" />
            <span class="brand-title">TripWise</span>
        </div>
    </footer>

    <script>
        (() => {
            "use strict";
            // Keep validation logic out of HTML attributes 

            const form = document.getElementById("comRegister");
            const password = document.getElementById("c_password");
            const confirmPassword = document.getElementById("c_confirm");

            /**
             * Ensures both password fields match.
             * Uses HTML5 validation so the browser displays consistent messages.
             */
            const validatePasswordsMatch = () => {
                if (password.value !== confirmPassword.value) {
                    confirmPassword.setCustomValidity("Passwords do not match.");
                } else {
                    confirmPassword.setCustomValidity("");
                }
            };

            // Live validation as the user types
            password.addEventListener("input", validatePasswordsMatch);
            confirmPassword.addEventListener("input", validatePasswordsMatch);

            form.addEventListener("submit", (e) => {
                // Validate matching before checking overall form validity
                validatePasswordsMatch();

                // Stop submission and show built-in browser messages if invalid
                if (!form.checkValidity()) {
                    e.preventDefault();
                    form.reportValidity();
                }
            });
        })();
    </script>
</body>

</html>
