<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripWise — Traveller Registration</title>
  <link rel="stylesheet" href="tripwise.css" />
</head>

<body class="auth-page">
  <header class="header">
    <div class="logo-bar"></div>
  </header>

  <main class="container">
    <section class="box">
      <h1>Traveller Registration</h1>
      <p class="subtitle">Create an account to book trips and receive destination guidance.</p>

      <p id="message" style="display:none; color:white; background:#d32f2f; padding:10px; border-radius:4px; text-align:center; margin-bottom:15px; font-weight:bold;"></p>

      <form id="travRegister" novalidate>
        <div class="field">
          <label for="t_name">Full Name</label>
          <input id="t_name" type="text" required autocomplete="name" placeholder="e.g., Alex Smith" />
        </div>

        <div class="field">
          <label for="t_email">Email</label>
          <input id="t_email" type="email" required autocomplete="email" placeholder="name@example.com" />
        </div>

        <div class="field">
          <label for="t_password">Password</label>
          <input id="t_password" type="password" minlength="8" required
            autocomplete="new-password" placeholder="Minimum 8 characters"
            aria-describedby="t_pw_hint" />
          <p id="t_pw_hint" class="pw-hint">Use at least 8 characters.</p>
        </div>

        <div class="field">
          <label for="t_confirm">Confirm Password</label>
          <input id="t_confirm" type="password" minlength="8" required
            autocomplete="new-password" placeholder="Re-enter password" />
        </div>

        <div class="checks">
          <label>
            <input id="terms" type="checkbox" required />
            I agree to the Terms and Conditions
          </label>
        </div>

        <button class="btn" type="submit">Create Traveller Account</button>

        <div class="row-actions">
          <a class="link" href="traveller-login.html">Already have an account? Log in</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="logo-bar"></div>
  </footer>

  <script src="api/api.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form         = document.getElementById("travRegister");
      const nameInput    = document.getElementById("t_name");
      const emailInput   = document.getElementById("t_email");
      const passInput    = document.getElementById("t_password");
      const confirmInput = document.getElementById("t_confirm");
      const pwHint       = document.getElementById("t_pw_hint");
      const msg          = document.getElementById("message");

      const showMsg = (text, isSuccess = false) => {
        msg.textContent = text;
        msg.style.display = "block";
        msg.style.backgroundColor = isSuccess ? "#2e7d32" : "#d32f2f";
      };

      /* Live password length hint */
      passInput.addEventListener("input", () => {
        const len = passInput.value.length;
        if (len === 0) {
          pwHint.textContent = "Use at least 8 characters.";
          pwHint.style.color = "#666";
        } else if (len < 8) {
          pwHint.textContent = `${8 - len} more character${8 - len === 1 ? "" : "s"} needed.`;
          pwHint.style.color = "#c62828";
        } else {
          pwHint.textContent = "✓ Password length is good.";
          pwHint.style.color = "#2e7d32";
        }
        /* Re-check match if confirm already has a value */
        if (confirmInput.value) validateMatch();
      });

      /* Live confirm match */
      const validateMatch = () => {
        if (confirmInput.value && passInput.value !== confirmInput.value) {
          confirmInput.setCustomValidity("Passwords do not match.");
        } else {
          confirmInput.setCustomValidity("");
        }
      };
      confirmInput.addEventListener("input", validateMatch);

      /* Submit */
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.style.display = "none";

        if (passInput.value.length < 8) {
          showMsg("Password must be at least 8 characters.");
          passInput.focus();
          return;
        }

        if (passInput.value !== confirmInput.value) {
          showMsg("Passwords do not match.");
          return;
        }

        if (!document.getElementById("terms").checked) {
          showMsg("You must agree to the terms.");
          return;
        }

        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        try {
          await apiFetch("/api/auth/register", {
            method: "POST",
            body: JSON.stringify({
              role:      "traveller",
              full_name: nameInput.value.trim(),
              email:     emailInput.value.trim().toLowerCase(),
              password:  passInput.value,
            }),
          });

          showMsg("Registration successful! Redirecting to login…", true);
          setTimeout(() => { window.location.href = "traveller-login.html"; }, 2000);

        } catch (err) {
          showMsg(err.message || "Registration failed. Please try again.");
        }
      });
    });
  </script>
</body>
</html>
