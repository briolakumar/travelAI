<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripWise — Reset Password</title>
    <link rel="stylesheet" href="tripwise.css" />
</head>

<body>
    <header class="header" aria-label="Top bar"></header>

    <header class="logo-bar pad-all" aria-label="TripWise branding">
        <img src="../images/logo1.png" alt="TripWise logo" />
        <span class="brand-title">TripWise</span>
    </header>

    <main class="container">
        <section class="box narrow" aria-labelledby="page-title">
            <h1 id="page-title">Reset Password</h1>
            <p class="subtitle">Enter a new password for your TripWise account.</p>

            <form id="resetForm" novalidate>
                <div class="field">
                    <label for="password">New Password</label>
                    <input id="password" name="password" type="password" minlength="8" required
                        autocomplete="new-password" placeholder="Minimum 8 characters" aria-describedby="pw-hint" />
                    <p class="hint" id="pw-hint">Use at least 8 characters.</p>
                </div>

                <div class="field">
                    <label for="confirm">Confirm New Password</label>
                    <input id="confirm" name="confirmPassword" type="password" minlength="8" required
                        autocomplete="new-password" placeholder="Re-enter password" />
                </div>

                <button class="btn mt-log" type="submit">Reset Password</button>

                <!-- Success message -->
                <div id="success" class="success" role="status" aria-live="polite">
                    Your password has been reset successfully. You can now log in.
                </div>

                <div class="row-actions">
                    <!-- Keep link consistent with project naming -->
                    <a class="link" href="traveller-login.html">Go to login</a>
                </div>
            </form>
        </section>
    </main>

    <footer class="footer" aria-label="Footer"></footer>

    <script>
        (() => {
            "use strict";
            // Wrap JS to avoid leaking variables into the global scope

            const form = document.getElementById("resetForm");
            const password = document.getElementById("password");
            const confirm = document.getElementById("confirm");
            const success = document.getElementById("success");

            // Ensure success message starts hidden (safe even if CSS changes)
            success.style.display = "none";

            /**
             * Uses HTML5 validation so the browser can show consistent messages.
             */
            const validateMatch = () => {
                if (password.value !== confirm.value) {
                    confirm.setCustomValidity("Passwords do not match.");
                } else {
                    confirm.setCustomValidity("");
                }
            };

            // Live validation as the user types
            password.addEventListener("input", validateMatch);
            confirm.addEventListener("input", validateMatch);

            form.addEventListener("submit", (e) => {
                e.preventDefault();

                // Run matching check before reporting validity
                validateMatch();

                // Let the browser handle required/minlength + our custom message
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }

                // Prototype behaviour: show success panel (replace with backend call)
                success.style.display = "block";
                form.reset();
            });
        })();
    </script>
</body>

</html>
