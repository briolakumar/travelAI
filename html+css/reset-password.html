<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripWise — Reset Password</title>
  <link rel="stylesheet" href="tripwise.css" />
</head>
<body>
  <header class="header" aria-label="Top bar"></header>

  <div class="logo-bar">
    <img src="../images/logo1.png" alt="TripWise logo" />
    <span class="brand-title">TripWise</span>
  </div>

  <main class="container">
    <section class="box narrow" aria-labelledby="page-title">
      <h2 id="page-title">Reset Password</h2>
      <p class="subtitle">Enter a new password for your TripWise account.</p>

      <div id="tokenError" style="display:none">
        <div class="error" style="display:block">
          This reset link is invalid or has expired.
          <br><br>
          <a class="link" id="requestNewLink" href="forgot-password.html">Request a new reset link →</a>
        </div>
      </div>

      <form id="resetForm" novalidate style="display:none">
        <label for="password">New Password</label>
        <input id="password" name="password" type="password" minlength="8" required
          autocomplete="new-password" placeholder="Minimum 8 characters" />
        <p id="pw-hint" style="font-size:12px;color:#666;margin:4px 0 0">Use at least 8 characters.</p>

        <label for="confirm" style="margin-top:14px">Confirm New Password</label>
        <input id="confirm" name="confirmPassword" type="password" minlength="8" required
          autocomplete="new-password" placeholder="Re-enter password" />

        <button class="btn" id="submitBtn" type="submit" style="margin-top:14px">Reset Password</button>

        <div id="errorMsg" class="error" role="alert" aria-live="assertive"></div>

        <div id="successMsg" class="success" role="status" aria-live="polite" style="display:none">
          Your password has been reset successfully.
          <br><br>
          <a class="link" id="goToLogin" href="traveller-login.html">Go to login →</a>
        </div>

        <div class="row-actions">
          <a class="link" id="backToLogin" href="traveller-login.html">Back to login</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer" aria-label="Footer"></footer>

  <script src="api/api.js"></script>
  <script>
    (() => {
      "use strict";

      const params = new URLSearchParams(window.location.search);
      const token  = params.get("token");
      const role   = params.get("role") || "traveller";

      const loginPages = {
        admin:     "admin-login.html",
        community: "localcommunities-login.html",
        traveller: "traveller-login.html"
      };
      const loginPage = loginPages[role] || "traveller-login.html";

      /* Set all login links to the correct page for this role */
      document.getElementById("goToLogin").href    = loginPage;
      document.getElementById("backToLogin").href  = loginPage;
      document.getElementById("requestNewLink").href =
        `forgot-password.html?role=${role}`;

      const resetForm  = document.getElementById("resetForm");
      const tokenError = document.getElementById("tokenError");
      const password   = document.getElementById("password");
      const confirm    = document.getElementById("confirm");
      const submitBtn  = document.getElementById("submitBtn");
      const errorMsg   = document.getElementById("errorMsg");
      const successMsg = document.getElementById("successMsg");

      const showError  = msg => { errorMsg.textContent = msg; errorMsg.style.display = "block"; };
      const clearError = ()  => { errorMsg.style.display = "none"; errorMsg.textContent = ""; };
      const setLoading = on  => {
        submitBtn.disabled    = on;
        submitBtn.textContent = on ? "Resetting…" : "Reset Password";
      };

      /* Validate token on page load */
      const initPage = async () => {
        if (!token) { tokenError.style.display = "block"; return; }
        try {
          await apiFetch(`/api/auth/reset-password?token=${encodeURIComponent(token)}`);
          resetForm.style.display = "block";
        } catch {
          tokenError.style.display = "block";
        }
      };

      initPage();

      /* Live password-match validation */
      const validateMatch = () => {
        if (confirm.value && password.value !== confirm.value) {
          confirm.setCustomValidity("Passwords do not match.");
        } else {
          confirm.setCustomValidity("");
        }
      };

      password.addEventListener("input", () => { clearError(); validateMatch(); });
      confirm.addEventListener("input",  () => { clearError(); validateMatch(); });

      /* Submit */
      resetForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearError();
        validateMatch();
        if (!resetForm.checkValidity()) { resetForm.reportValidity(); return; }

        setLoading(true);
        try {
          await apiFetch("/api/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, password: password.value })
          });

          submitBtn.style.display = "none";
          document.getElementById("pw-hint").style.display = "none";
          successMsg.style.display = "block";
          resetForm.reset();

        } catch (err) {
          if (err.message?.includes("400")) {
            showError("This reset link has expired. Please request a new one.");
            setTimeout(() => { window.location.href = `forgot-password.html?role=${role}`; }, 3000);
          } else if (err.message?.includes("422")) {
            showError("Password does not meet requirements. Use at least 8 characters.");
          } else {
            showError("Something went wrong. Please try again or request a new reset link.");
          }
        } finally {
          setLoading(false);
        }
      });
    })();
  </script>
</body>
</html>
