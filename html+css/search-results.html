<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripWise — Search Results</title>
  <link rel="stylesheet" href="tripwise.css" />

</head>

<body>
  <div class="top" role="banner">
    <div class="brand">
      <img src="../images/logo1.png" alt="TripWise logo" />
      <h1>TripWise</h1>
    </div>
    <nav class="actions">
      <a class="btn btn-primary" href="search-destination.html">New search</a>
      <a class="btn btn-primary" href="traveller-dashboard.html">Dashboard</a>
    </nav>
  </div>

  <main class="container">
    <h2 style="margin-bottom:6px">Search Results</h2>
    <p style="color:#666;font-size:14px;margin-bottom:16px">
      Browse destinations and click to view details, cultural guidance, and book your stay.
    </p>

    <div id="filterBar">
      <input id="filterInput" type="text" placeholder="Filter by destination or country…" />
    </div>

    <p class="result-count" id="resultCount"></p>

    <div class="grid" id="resultsGrid"></div>
  </main>

  <script src="api/api.js"></script>
  <script>
    (async () => {
      const grid = document.getElementById("resultsGrid");
      const filterInput = document.getElementById("filterInput");
      const resultCount = document.getElementById("resultCount");

      /* Pre-fill filter from URL ?q= */
      const params = new URLSearchParams(window.location.search);
      if (params.get("q")) filterInput.value = params.get("q");

      let allDestinations = [];

      const renderCards = (destinations) => {
        resultCount.textContent = `${destinations.length} destination${destinations.length !== 1 ? "s" : ""} found`;

        if (!destinations.length) {
          grid.innerHTML = `
            <div class="no-results">
              <p>No destinations match your search.</p>
              <a class="btn btn-primary" href="search-destination.html" style="margin-top:12px;display:inline-block">
                Try a new search
              </a>
            </div>`;
          return;
        }

        grid.innerHTML = destinations.map(d => {
          const imgSrc = d.image_url
            ? (d.image_url.startsWith("/") ? `..${d.image_url}` : `../${d.image_url}`)
            : `../images/${d.slug}.png`;

          return `
            <div class="card span-6">
              <img
                class="dest-img"
                src="${imgSrc}"
                alt="${d.name}"
                onerror="this.onerror=null;this.src='../images/logo1.png'"
              />
              <h3 style="margin-bottom:4px">${d.name}</h3>
              <p style="font-size:13px;color:#666;margin-bottom:4px">${d.country_name}</p>
              <p style="font-size:13px;color:#444;margin-bottom:12px;line-height:1.45">
                ${d.description || ""}
              </p>
              <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
                <span class="pill" style="font-size:12px">🌤 ${d.best_time || "Year-round"}</span>
                <span class="pill" style="font-size:12px">🗣 ${d.language_tips || "—"}</span>
              </div>
              <a class="btn btn-primary" href="destination-details.html?dest=${d.slug}">
                View &amp; Book
              </a>
            </div>`;
        }).join("");
      };

      const applyFilter = () => {
        const q = filterInput.value.trim().toLowerCase();
        if (!q) {
          renderCards(allDestinations);
          return;
        }
        const filtered = allDestinations.filter(d =>
          d.name.toLowerCase().includes(q) ||
          (d.country_name || "").toLowerCase().includes(q) ||
          (d.description || "").toLowerCase().includes(q)
        );
        renderCards(filtered);
      };

      /* Load destinations */
      try {
        grid.innerHTML = `<div class="no-results"><p>Loading destinations…</p></div>`;
        allDestinations = await apiFetch("/api/destinations");
        applyFilter();
      } catch (err) {
        grid.innerHTML = `<div class="no-results"><p>Could not load destinations. Please try again.</p></div>`;
        console.error(err);
      }

      filterInput.addEventListener("input", applyFilter);
    })();
  </script>
</body>

</html>
