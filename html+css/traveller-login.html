<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripWise — Traveller Login</title>
  <link rel="stylesheet" href="tripwise.css" />
</head>
<body class="auth-page">
  <header class="header">
    <div class="logo-bar"></div>
  </header>

  <main class="container">
    <section class="box">
      <h1>Traveller Login</h1>
      <p class="subtitle">Log in to view bookings and guidance.</p>

      <p id="message"
        style="display:none; color:white; background:#d32f2f; padding:10px; border-radius:4px; text-align:center; margin-bottom:15px; font-weight:bold;">
      </p>

      <form id="travLogin" novalidate>
        <div class="field">
          <label for="t_email">Email</label>
          <input id="t_email" type="email" required placeholder="name@example.com" />
        </div>

        <div class="field">
          <label for="t_password">Password</label>
          <input id="t_password" type="password" required placeholder="Your password" />
        </div>

        <div class="row">
          <div class="checks">
            <label><input id="remember" type="checkbox" /> Remember me</label>
          </div>
          <a class="link" href="forgot-password.html?role=traveller">Forgot password?</a>
        </div>

        <button class="btn" type="submit">Log In</button>

        <div class="row-actions" style="display:flex;flex-direction:column;gap:8px;align-items:center;">
  <a class="link" href="traveller-register.html">Don't have an account? Register</a>
  <a class="link" href="homepage.html">← Back to home</a>
</div>
      </form>
    </section>
  </main>

  <script src="api/api.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form    = document.getElementById("travLogin");
      const emailEl = document.getElementById("t_email");
      const passEl  = document.getElementById("t_password");
      const msg     = document.getElementById("message");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.textContent = "";
        msg.style.display = "none";

        if (!form.checkValidity()) { form.reportValidity(); return; }

        try {
          const data = await apiFetch("/api/auth/login", {
            method: "POST",
            body: JSON.stringify({
              email:    emailEl.value.trim().toLowerCase(),
              password: passEl.value
            })
          });

          if (data.role !== "traveller") {
            msg.textContent = "This login is for travellers only.";
            msg.style.display = "block";
            return;
          }

          setToken(data.token, "traveller");
          localStorage.setItem("tripwise_role", data.role);
          localStorage.setItem("tripwise_name", data.full_name || "");

          window.location.href = "traveller-dashboard.html";

        } catch (err) {
          msg.textContent = err.message || "Invalid email or password.";
          msg.style.display = "block";
        }
      });
    });
  </script>
</body>
</html>
