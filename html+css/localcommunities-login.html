<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripWise — Community Login</title>
  <link rel="stylesheet" href="tripwise.css" />
</head>
<body class="auth-page">
  <header class="header" aria-label="Site header"></header>

  <div class="logo-bar"></div>

  <main class="container">
    <section class="box" aria-labelledby="page-title">
      <h2 id="page-title">Community Partner Login</h2>
      <p class="subtitle">Log in to share local insights and help travellers.</p>

      <p id="message"
        style="display:none; color:white; background:#d32f2f; padding:10px; border-radius:4px; text-align:center; margin-bottom:15px; font-weight:bold;">
      </p>

      <form id="comLogin" novalidate>
        <label for="c_email">Contact Email</label>
        <input id="c_email" name="email" type="email" required autocomplete="email"
          placeholder="contact@tripwisecommunity.com" />

        <label for="c_password">Password</label>
        <input id="c_password" name="password" type="password" required autocomplete="current-password"
          placeholder="Your password" />

        <div class="row">
          <a class="link" href="forgot-password.html?role=community">Forgot password?</a>
        </div>

        <button class="btn" type="submit">Log In</button>
        <a class="link" href="localcommunities-register.html">Don't have an account? Register</a>
      </form>
    </section>
  </main>

  <div class="logo-bar"></div>
  <footer class="footer" aria-label="Site footer"></footer>

  <script src="api/api.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form    = document.getElementById("comLogin");
      const emailEl = document.getElementById("c_email");
      const passEl  = document.getElementById("c_password");
      const msg     = document.getElementById("message");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.textContent = "";
        msg.style.display = "none";

        if (!form.checkValidity()) { form.reportValidity(); return; }

        try {
          const data = await apiFetch("/api/auth/login", {
            method: "POST",
            body: JSON.stringify({
              email:    emailEl.value.trim().toLowerCase(),
              password: passEl.value
            })
          });

          if (data.role !== "community") {
            msg.textContent = "This login is for community partners only.";
            msg.style.display = "block";
            return;
          }

          setToken(data.token, "community");
          localStorage.setItem("tripwise_role", data.role);
          localStorage.setItem("tripwise_name", data.full_name || "");

          window.location.href = "localcommunities-dashboard.html";

        } catch (err) {
          msg.textContent = err.message || "Invalid email or password.";
          msg.style.display = "block";
        }
      });
    });
  </script>
</body>
</html>
