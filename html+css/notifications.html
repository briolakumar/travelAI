<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripWise — Notifications</title>
  <link rel="stylesheet" href="tripwise.css" />
  
</head>
<body>
  <header class="header" aria-label="Top bar"></header>

  <div class="top" role="banner">
    <div class="brand">
      <img src="../images/logo1.png" alt="TripWise logo" />
      <h1>TripWise</h1>
    </div>
    <nav style="display:flex;flex-direction:row;gap:10px;align-items:center;">
      <a class="btn btn-primary" href="traveller-dashboard.html">Dashboard</a>
    </nav>
  </div>

  <main class="container">
    <section class="card" aria-labelledby="page-title">
      <h2 id="page-title">Notifications</h2>
      <p>Booking confirmations, reminders, and responsible travel updates.</p>

      <div class="list" id="notificationList" aria-label="Notifications list">
        <div class="item"><div><strong>Loading…</strong></div></div>
      </div>

      <div class="actions" style="margin-top:14px;">
        <button class="btn btn-primary" type="button" id="markReadBtn">Mark all as read</button>
        <a class="btn btn-ghost" href="traveller-dashboard.html">Back</a>
      </div>
    </section>
  </main>

  <footer class="footer" aria-label="Footer"></footer>
  <div class="toast" id="toast"></div>

  <script src="api/api.js"></script>
  <script>
    (() => {
      "use strict";

      if (!getToken()) {
        window.location.href = "traveller-login.html";
        return;
      }

      let toastTimer = null;
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove("show"), 3000);
      }

      function formatDate(d) {
        if (!d) return "N/A";
        const dt = new Date(d);
        if (Number.isNaN(dt.getTime())) return d;
        return dt.toLocaleDateString(undefined, { day:"2-digit", month:"short", year:"numeric" });
      }

      function daysUntil(dateStr) {
        const today = new Date(); today.setHours(0,0,0,0);
        const target = new Date(dateStr); target.setHours(0,0,0,0);
        return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
      }

      function buildNotifications(bookings) {
        const notifications = [];

        bookings.forEach(b => {
          const days  = daysUntil(b.check_in);
          const dest  = b.destination_name || "your destination";
          const cin   = formatDate(b.check_in);
          const cout  = formatDate(b.check_out);
          const accom = b.accommodation_title || "Accommodation booked";

          const today = new Date(); today.setHours(0,0,0,0);
          const start = new Date(b.check_in); start.setHours(0,0,0,0);
          const end   = new Date(b.check_out); end.setHours(0,0,0,0);

          /* Always: booking confirmed */
          notifications.push({
            title: `Booking confirmed — ${dest}`,
            sub:   `${cin} → ${cout} • ${accom}`,
            tag:   "ok", label: "Confirmed"
          });

          /* Trip in progress */
          if (today >= start && today <= end) {
            notifications.push({
              title: `You're in ${dest} right now! 🌍`,
              sub:   `Your trip runs until ${cout}. Open the chatbot if you need guidance on the ground.`,
              tag:   "info", label: "Active"
            });
          }

          /* Upcoming: within 30 days */
          if (days > 0 && days <= 30) {
            notifications.push({
              title: `Trip reminder — ${dest} in ${days} day${days === 1 ? "" : "s"}`,
              sub:   `Check in on ${cin}. Open the chatbot for cultural and legal guidance before you arrive.`,
              tag:   "warn", label: "Reminder"
            });
          }

          /* Upcoming: within 7 days */
          if (days > 0 && days <= 7) {
            notifications.push({
              title: `Final check — ${dest} is almost here!`,
              sub:   `You leave in ${days} day${days === 1 ? "" : "s"}. Review local laws, dress codes, and etiquette in the chatbot.`,
              tag:   "warn", label: "Action"
            });
          }

          /* Past trip: ask for feedback */
          if (days < 0) {
            notifications.push({
              title: `How was ${dest}?`,
              sub:   `Your trip ended ${cout}. Leave feedback to help other travellers plan responsibly.`,
              tag:   "info", label: "Feedback",
              link:  "feedback.html"
            });
          }
        });

        return notifications;
      }

      function renderNotifications(notifications) {
        const list = document.getElementById("notificationList");

        if (!notifications.length) {
          list.innerHTML = `<div class="item"><div><strong>No notifications yet.</strong><small>Book a destination to unlock notifications.</small></div></div>`;
          return;
        }

        list.innerHTML = notifications.map((n, i) => `
          <div class="item">
            <div>
              <strong>${n.title}</strong>
              <small>${n.sub}</small>
              ${n.link ? `<div style="margin-top:6px;"><a class="link" href="${n.link}">Leave feedback →</a></div>` : ""}
            </div>
            <span class="tag ${n.tag}" id="ntag-${i}">${n.label}</span>
          </div>`).join("");
      }

      document.getElementById("markReadBtn").addEventListener("click", () => {
        document.querySelectorAll("[id^='ntag-']").forEach(tag => {
          tag.textContent = "Read";
          tag.className   = "tag";
        });
        showToast("All notifications marked as read.");
      });

      document.addEventListener("DOMContentLoaded", async () => {
        try {
          const bookings = await apiFetch("/api/bookings/me");
          if (!Array.isArray(bookings) || bookings.length === 0) {
            document.getElementById("notificationList").innerHTML =
              `<div class="item"><div><strong>No notifications yet.</strong><small>Book a destination to get started.</small></div></div>`;
            return;
          }
          renderNotifications(buildNotifications(bookings));
        } catch (err) {
          console.error("Notifications error:", err);
          document.getElementById("notificationList").innerHTML =
            `<div class="item"><div><strong>Could not load notifications.</strong><small>${err.message}</small></div></div>`;
        }
      });

    })();
  </script>
</body>
</html>
