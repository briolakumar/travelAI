<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripWise — Admin Register</title>
  <link rel="stylesheet" href="tripwise.css" />
</head>

<body class="auth-page">
  <header class="header" aria-label="Site header"></header>

  <main class="container">
    <section class="box" aria-labelledby="page-title">
      <h2 id="page-title">Admin Registration</h2>
      <p class="subtitle">Create an admin account for TripWise management.</p>

     

      <p id="message" style="display:none; color:white; background:#d32f2f; padding:10px; border-radius:4px; text-align:center; margin-bottom:15px; font-weight:bold;"></p>

      <form id="adminRegister" novalidate>
        <label for="a_name">Full Name</label>
        <input id="a_name" name="full_name" type="text" required
          autocomplete="name" placeholder="e.g., Sam Admin" />

        <label for="a_email">Work Email</label>
        <input id="a_email" name="email" type="email" required
          autocomplete="email" placeholder="name@tripwiseadmin.com"
          aria-describedby="a_email_hint" />
        <p id="a_email_hint" class="pw-hint">Must end in @tripwiseadmin.com</p>

        <label for="a_password">Password</label>
        <input id="a_password" name="password" type="password" minlength="8" required
          autocomplete="new-password" placeholder="Minimum 8 characters"
          aria-describedby="a_pw_hint" />
        <p id="a_pw_hint" class="pw-hint">Use at least 8 characters.</p>

        <label for="a_confirm">Confirm Password</label>
        <input id="a_confirm" name="confirmPassword" type="password" minlength="8" required
          autocomplete="new-password" placeholder="Re-enter password" />

        <button class="btn" type="submit">Create Admin Account</button>

        <div class="row-actions">
          <a class="link" href="admin-login.html">Already an admin? Log in</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer" aria-label="Site footer"></footer>

  <script src="api/api.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form       = document.getElementById("adminRegister");
      const nameEl     = document.getElementById("a_name");
      const emailEl    = document.getElementById("a_email");
      const emailHint  = document.getElementById("a_email_hint");
      const passwordEl = document.getElementById("a_password");
      const pwHint     = document.getElementById("a_pw_hint");
      const confirmEl  = document.getElementById("a_confirm");
      const msg        = document.getElementById("message");

      const showMsg = (text, isSuccess = false) => {
        msg.textContent = text;
        msg.style.display = "block";
        msg.style.backgroundColor = isSuccess ? "#2e7d32" : "#d32f2f";
      };

      /* Live domain check */
      emailEl.addEventListener("input", () => {
        const val = emailEl.value.trim().toLowerCase();
        if (!val) {
          emailHint.textContent = "Must end in @tripwiseadmin.com";
          emailHint.style.color = "#666";
        } else if (!val.endsWith("@tripwiseadmin.com")) {
          emailHint.textContent = "✗ Must end in @tripwiseadmin.com";
          emailHint.style.color = "#c62828";
          emailEl.setCustomValidity("Admin accounts must use a @tripwiseadmin.com email address.");
        } else {
          emailHint.textContent = "✓ Valid admin email.";
          emailHint.style.color = "#2e7d32";
          emailEl.setCustomValidity("");
        }
      });

      /* Live password length hint */
      passwordEl.addEventListener("input", () => {
        const len = passwordEl.value.length;
        if (len === 0) {
          pwHint.textContent = "Use at least 8 characters.";
          pwHint.style.color = "#666";
        } else if (len < 8) {
          pwHint.textContent = `${8 - len} more character${8 - len === 1 ? "" : "s"} needed.`;
          pwHint.style.color = "#c62828";
        } else {
          pwHint.textContent = "✓ Password length is good.";
          pwHint.style.color = "#2e7d32";
        }
        if (confirmEl.value) validateMatch();
      });

      /* Live confirm match */
      const validateMatch = () => {
        if (confirmEl.value && passwordEl.value !== confirmEl.value) {
          confirmEl.setCustomValidity("Passwords do not match.");
        } else {
          confirmEl.setCustomValidity("");
        }
      };
      confirmEl.addEventListener("input", validateMatch);

      /* Submit */
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.style.display = "none";

        const email = emailEl.value.trim().toLowerCase();

        if (!email.endsWith("@tripwiseadmin.com")) {
          showMsg("Admin accounts must use a @tripwiseadmin.com email address.");
          emailEl.focus();
          return;
        }

        if (passwordEl.value.length < 8) {
          showMsg("Password must be at least 8 characters.");
          passwordEl.focus();
          return;
        }

        if (passwordEl.value !== confirmEl.value) {
          showMsg("Passwords do not match.");
          confirmEl.focus();
          return;
        }

        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        try {
          await apiFetch("/api/auth/register", {
            method: "POST",
            body: JSON.stringify({
              role:      "admin",
              full_name: nameEl.value.trim(),
              email:     email,
              password:  passwordEl.value,
            }),
          });

          showMsg("Admin registration successful! Redirecting to login…", true);
          setTimeout(() => { window.location.href = "admin-login.html"; }, 2000);

        } catch (err) {
          showMsg(err.message || "Registration failed. Please try again.");
        }
      });
    });
  </script>
</body>
</html>
