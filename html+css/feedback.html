<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripWise — Feedback</title>
  <link rel="stylesheet" href="tripwise.css" />
</head>

<body>
  <header class="header" aria-label="Site header"></header>

  <div class="top" role="banner">
    <div class="brand">
      <img src="../images/logo1.png" alt="TripWise logo" />
      <h1>TripWise</h1>
    </div>
    <nav class="actions" aria-label="Page links">
      <a class="btn btn-primary" href="traveller-dashboard.html">Dashboard</a>
      <a class="btn btn-primary" href="booking-history.html">Booking history</a>
    </nav>
  </div>

  <main class="container">
    <section class="card" aria-labelledby="page-title">
      <h2 id="page-title">Leave Feedback</h2>
      <p>Your feedback helps improve TripWise and supports responsible tourism.</p>

      <form id="feedbackForm" action="#" method="post" novalidate>

        <div class="field">
          <label for="trip">Which trip is this about?</label>
          <select id="trip" name="trip" required>
            <option value="">Loading your bookings…</option>
          </select>
        </div>

        <div class="field">
          <label for="topic">Topic</label>
          <select id="topic" name="topic">
            <option value="general">General feedback</option>
            <option value="destination">Destination information</option>
            <option value="cultural_guidance">Cultural guidance</option>
            <option value="booking">Booking experience</option>
            <option value="chatbot">Chatbot</option>
            <option value="learning_hub">Learning Hub</option>
          </select>
        </div>

        <div class="field">
          <span class="label">Rating</span>
          <div class="stars" role="group" aria-labelledby="rating-label">
            <span id="rating-label" class="sr-only">Star rating out of 5</span>
            <button class="star" type="button" data-v="1" aria-label="1 star" aria-pressed="false">★</button>
            <button class="star" type="button" data-v="2" aria-label="2 stars" aria-pressed="false">★</button>
            <button class="star" type="button" data-v="3" aria-label="3 stars" aria-pressed="false">★</button>
            <button class="star" type="button" data-v="4" aria-label="4 stars" aria-pressed="false">★</button>
            <button class="star" type="button" data-v="5" aria-label="5 stars" aria-pressed="false">★</button>
          </div>
          <input id="rating" name="rating" type="hidden" value="0" />
        </div>

        <div class="field">
          <label for="comments">Comments (optional)</label>
          <textarea id="comments" name="comments" rows="4"
            placeholder="What worked well? What could be improved?"></textarea>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="submitBtn" type="submit">Submit feedback</button>
          <button class="btn btn-ghost" type="button"
            onclick="window.location.href='traveller-dashboard.html'">Cancel</button>
        </div>

        <div id="errorMsg" class="error" role="alert" aria-live="assertive"></div>

        <p id="success" class="success" role="status" aria-live="polite" hidden>
          Thank you! Your feedback has been submitted.
        </p>

      </form>
    </section>
  </main>

  <footer class="footer" aria-label="Site footer"></footer>

  <script src="api/api.js"></script>
  <script>
    (() => {
      "use strict";

      /* Auth guard */
      if (!localStorage.getItem("tripwise_token_traveller") && !localStorage.getItem("tripwise_token")) {
        window.location.href = "traveller-login.html";
      }

      const form = document.getElementById("feedbackForm");
      const tripSelect = document.getElementById("trip");
      const starBtns = document.querySelectorAll(".star");
      const ratingInput = document.getElementById("rating");
      const submitBtn = document.getElementById("submitBtn");
      const errorMsg = document.getElementById("errorMsg");
      const successMsg = document.getElementById("success");

      /* Helpers */
      const showError = msg => { errorMsg.textContent = msg; errorMsg.style.display = "block"; successMsg.hidden = true; };
      const clearError = () => { errorMsg.style.display = "none"; errorMsg.textContent = ""; };
      const setLoading = on => { submitBtn.disabled = on; submitBtn.textContent = on ? "Submitting…" : "Submit feedback"; };

      /* Star rating */
      const setRating = value => {
        ratingInput.value = String(value);
        starBtns.forEach(btn => {
          const v = Number(btn.dataset.v);
          btn.classList.toggle("active", v <= value);
          btn.setAttribute("aria-pressed", String(v <= value));
        });
      };

      starBtns.forEach(btn => {
        btn.addEventListener("click", () => {
          clearError();
          successMsg.hidden = true;
          setRating(Number(btn.dataset.v));
        });
      });

      /* Load real bookings into the dropdown */
      const loadBookings = async () => {
        try {
          const bookings = await apiFetch("/api/bookings/me");

          if (!bookings || bookings.length === 0) {
            tripSelect.innerHTML = `<option value="">No bookings found</option>`;
            tripSelect.disabled = true;
            return;
          }

          tripSelect.innerHTML = `<option value="">Select a trip…</option>` +
            bookings.map(b => {
              const label = b.destination_name
                ? `${b.destination_name}${b.check_in ? " — " + b.check_in : ""}`
                : `Booking #${b.id}`;
              return `<option value="${b.id}">${label}</option>`;
            }).join("");

        } catch (err) {
          console.error("Could not load bookings:", err.message);

          /* Fall back to a general option so the user can still submit */
          tripSelect.innerHTML = `<option value="">General feedback (no specific trip)</option>`;
        }
      };

      loadBookings();

      /* Form submission */
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearError();
        successMsg.hidden = true;

        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        if (Number(ratingInput.value) === 0) {
          showError("Please select a star rating before submitting.");
          return;
        }

        const bookingId = tripSelect.value ? Number(tripSelect.value) : null;
        const rating = Number(ratingInput.value);
        const topic = document.getElementById("topic").value;
        const comments = document.getElementById("comments").value.trim() || null;

        setLoading(true);

        try {
          await apiFetch("/api/feedback", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ booking_id: bookingId, rating, topic, comments }),
          });

          successMsg.hidden = false;
          form.reset();
          setRating(0);

          /* Scroll success message into view */
          successMsg.scrollIntoView({ behavior: "smooth", block: "nearest" });

        } catch (err) {
          if (err.message && err.message.includes("400")) {
            showError("Invalid rating. Please select between 1 and 5 stars.");
          } else if (err.message && err.message.includes("401")) {
            window.location.href = "traveller-login.html";
          } else {
            showError("Something went wrong. Please try again.");
          }
        } finally {
          setLoading(false);
        }
      });

      /* Hide messages when user changes the trip */
      tripSelect.addEventListener("change", () => {
        clearError();
        successMsg.hidden = true;
      });

    })();
  </script>
</body>

</html>
