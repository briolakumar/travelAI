<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripWise — Booking Details</title>
  <link rel="stylesheet" href="tripwise.css" />
</head>

<body>
  <header class="header" aria-label="Site header"></header>

  <div class="top" role="banner">
    <div class="brand">
      <img src="../images/logo1.png" alt="TripWise logo" />
      <h1>TripWise</h1>
    </div>

    <nav class="actions" aria-label="Secondary navigation">
      <a class="btn btn-primary" href="booking-history.html">← Booking history</a>
      <a class="btn btn-primary" href="traveller-dashboard.html">Dashboard</a>
    </nav>
  </div>

  <main class="container">
    <div class="grid">
      <section class="card span-7" aria-labelledby="page-title">
        <h2 id="page-title">Booking Details</h2>
        <p>View your real booking details below.</p>

        <div id="bookingDetailsCard" class="booking-list" aria-label="Booking details">
          <div class="item">
            <div><strong>Loading…</strong></div>
          </div>
        </div>

        <p id="bookingDetailsMsg" style="margin-top: 12px;"></p>

        <div class="actions" style="margin-top: 14px">
          <a class="link" href="booking-history.html">Back to booking history</a>
          <a class="link" href="feedback.html">Leave feedback</a>
        </div>
      </section>

      <aside class="card span-5" aria-labelledby="next-steps-title">
        <h2 id="next-steps-title">Next Steps</h2>
        <p>TripWise provides chatbot guidance after booking to support respectful travel.</p>

        <a id="openChatbotBtn" class="btn btn-primary" href="booking-history.html">
          Open Chatbot
        </a>

        <div style="height: 10px"></div>

        <button class="btn btn-ghost" type="button" onclick="window.location.href='notifications.html'">
          View Notifications
        </button>
      </aside>
    </div>
  </main>

  <footer class="footer" aria-label="Site footer"></footer>

  <script src="api/api.js"></script>
  <script>
    if (!getToken()) {
  window.location.href = "traveller-login.html";
}

    function qp(name) {
      return new URL(window.location.href).searchParams.get(name);
    }

    function formatDate(dateStr) {
      if (!dateStr) return "N/A";
      const date = new Date(dateStr);
      if (Number.isNaN(date.getTime())) return dateStr;
      return date.toLocaleDateString(undefined, {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    }

    function countdownLabel(startISO, endISO) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const start = new Date(startISO);
      const end = new Date(endISO);
      start.setHours(0, 0, 0, 0);
      end.setHours(0, 0, 0, 0);

      if (today < start) {
        const days = Math.ceil((start - today) / (1000 * 60 * 60 * 24));
        return { text: `${days} day${days === 1 ? "" : "s"} to go`, cls: "upcoming" };
      }

      if (today >= start && today <= end) {
        return { text: "Trip in progress", cls: "in-progress" };
      }

      return { text: "Trip ended", cls: "ended" };
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const bookingId = qp("booking_id");
      const card = document.getElementById("bookingDetailsCard");
      const msg = document.getElementById("bookingDetailsMsg");
      const chatbotBtn = document.getElementById("openChatbotBtn");

      if (!bookingId) {
        card.innerHTML = `<div class="item"><div><strong>No booking selected.</strong></div></div>`;
        msg.textContent = "Open this page from the dashboard or booking history.";
        chatbotBtn.href = "booking-history.html";
        return;
      }

      try {
        const booking = await apiFetch(`/api/bookings/${bookingId}`);
        const countdown = countdownLabel(booking.check_in, booking.check_out);

        card.innerHTML = `
          <article class="booking-item" aria-label="Booking ${booking.id}">
            <div>
              <div class="booking-dest">${booking.destination_name}, ${booking.country_name}</div>
              <div class="booking-meta">🏨 ${booking.accommodation_title || "Accommodation not selected"}</div>
              <div class="booking-meta">📅 ${formatDate(booking.check_in)} → ${formatDate(booking.check_out)} • 👥 ${booking.guests} guest(s)</div>
              <div class="booking-meta">Status: <strong>${booking.status}</strong></div>
              <div class="booking-meta">Best time: ${booking.best_time || "N/A"}</div>
              <div class="booking-meta">Occasions: ${booking.occasions || "N/A"}</div>
              <div class="booking-meta">Language tip: ${booking.language_tips || "N/A"}</div>
            </div>

            <div class="booking-right">
              <span class="tag booking-tag">${booking.status}</span>
              <div class="countdown-pill ${countdown.cls}" aria-label="Countdown to trip">
                <span class="countdown-ico" aria-hidden="true">⏳</span>
                <span class="countdown-text">${countdown.text}</span>
              </div>
            </div>
          </article>
        `;

        chatbotBtn.href = `chatbot-guidance.html?booking_id=${booking.id}`;
      } catch (err) {
        console.error("Booking details error:", err);
        card.innerHTML = `<div class="item"><div><strong>Error loading booking.</strong></div></div>`;
        msg.textContent = err.message;
        chatbotBtn.href = "booking-history.html";
      }
    });
  </script>
</body>

</html>
